name: cam_ml
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.10.5+9
  geolocator: ^12.0.0
  flutter_compass: ^0.8.1
  path_provider: ^2.1.2
  image: ^4.1.7
  permission_handler: ^11.3.1
  provider: ^6.1.2
  archive: ^4.0.0
  share_plus: ^11.0.0
  sensors_plus: ^6.1.0
  vector_math: ^2.2.0
  http: ^1.2.1
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  google_sign_in: ^6.3.0
  googleapis: ^14.0.0
  google_mlkit_object_detection: ^0.13.1
  google_mlkit_commons: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icon/icon.png'

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
